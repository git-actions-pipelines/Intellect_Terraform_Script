name: Hub Apply

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  ARM_USE_MSI: true
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: Hub Apply
    runs-on: self-hosted
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (with backend)
        run: terraform -chdir="Intellect_Hub_Terraform_Script" init

      - name: Terraform Plan (Hub)
        run: terraform -chdir="Intellect_Hub_Terraform_Script" plan

      - name: Terraform Apply (Hub)
        run: terraform -chdir="Intellect_Hub_Terraform_Script" apply --auto-approve