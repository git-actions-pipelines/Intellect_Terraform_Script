name: Spoke Apply

on:
  workflow_run:
    workflows: ["Hub Apply"]
    types: [completed]

permissions:
  contents: read

env:
  ARM_USE_MSI: true
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: Spoke Apply
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (with backend)
        run: terraform -chdir="Intellect_Spoke_Terraform_Script" init

      - name: Terraform Plan (Spoke)
        run: terraform -chdir="Intellect_Spoke_Terraform_Script" plan

      - name: Terraform Apply (Spoke)
        run: terraform -chdir="Intellect_Spoke_Terraform_Script" apply --auto-approve